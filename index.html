const ANNATA_CORRENTE="2025/2026";
let annataAttiva=null; // null = usa struttura classica (retrocompatibilità)

function getAnnataDB(){
  // Retrocompatibilità: se db non ha annate, tutta la struttura classica è l'annata corrente
  if(!db.annate) return db;
  return db.annate[annataAttiva]||db.annate[Object.keys(db.annate)[0]]||db;
}

function getAnnateList(){
  if(!db.annate) return [ANNATA_CORRENTE];
  return Object.keys(db.annate).sort().reverse();
}

function initAnnate(){
  if(!db.annate){
    // Prima migrazione: sposta tutto in annata corrente
    const snapshot={
      folders:db.folders||[],entities:db.entities||[],
      checks:db.checks||{},notes:db.notes||{},
      qval:db.qval||{},qnotes:db.qnotes||{},
      dates:db.dates||{},attach:db.attach||{},
      docDates:db.docDates||{},pac:db.pac||{}
    };
    db.annate={[ANNATA_CORRENTE]:snapshot};
    db.folders=[];db.entities=[];db.checks={};db.notes={};
    db.qval={};db.qnotes={};db.dates={};db.attach={};
    db.docDates={};db.pac={};
    annataAttiva=ANNATA_CORRENTE;
    save();
  } else {
    annataAttiva=annataAttiva||Object.keys(db.annate).sort().reverse()[0];
  }
}

function nuovaAnnata(nome){
  if(!nome||!nome.trim())return;
  nome=nome.trim();
  if(!db.annate)initAnnate();
  if(db.annate[nome]){alert("Annata già esistente.");return;}
  db.annate[nome]={folders:[],entities:[],checks:{},notes:{},qval:{},qnotes:{},dates:{},attach:{},docDates:{},pac:{}};
  annataAttiva=nome;
  save();render();
}

function switchAnnata(nome){
  annataAttiva=nome;
  editNote=null;editQNote=null;
  render();
}

function getAllDeadlines(){
  const out=[];const adb=getAnnataDB();
  (adb.entities||[]).forEach(e=>{
    const dd=(adb.docDates||{})[e.id]||{};
    Object.entries(dd).forEach(([k,dateStr])=>{
      if(!dateStr)return;
      // find doc label
      let docLabel="Documento";
      DOC_SECTIONS.forEach(sec=>{
        sec.items.forEach((text,idx)=>{
          if(sec.id+"_"+idx===k) docLabel=text;
        });
      });
      const st=docDateStatus(dateStr);
      if(!st)return;
      out.push({eid:e.id,ename:e.name,etype:e.type,k,dateStr,docLabel,st});
    });
  });
  out.sort((a,b)=>{
    // expired first (most overdue last), then upcoming (soonest first)
    if(a.st.diff<0&&b.st.diff<0) return b.st.diff-a.st.diff; // most recent expiry first
    if(a.st.diff<0) return -1;
    if(b.st.diff<0) return 1;
    return a.st.diff-b.st.diff;
  });
  return out;
}

  const all=getAllDeadlines();
  const expired=all.filter(x=>x.st.s==="expired"||x.st.s==="today");
  const soon=all.filter(x=>x.st.s==="soon"||x.st.s==="warning");
  const ok=all.filter(x=>x.st.s==="ok");

  // Filter tabs
  const tabsEl=mk("div","scad-page-tabs no-print");
  [{id:"urgenti",label:`⛔ Critici (${expired.length+soon.length})`},{id:"tutti",label:`📅 Tutti (${all.length})`},{id:"ok",label:`✓ Validi (${ok.length})`}].forEach(t=>{
    const b=mk("button","scad-page-tab"+(scadTab===t.id?" active":""));b.textContent=t.label;
    b.onclick=()=>{scadTab=t.id;renderScadenzario();};tabsEl.appendChild(b);

  root.appendChild(tabsEl);

  let list=[];
  if(scadTab==="urgenti") list=[...expired,...soon];
  else if(scadTab==="ok") list=ok;
  else list=all;

  if(!list.length){
    const em=mk("div","scad-empty");
    em.textContent=scadTab==="urgenti"?"✅ Nessuna scadenza critica al momento.":scadTab==="ok"?"Nessun documento con scadenza futura inserita.":"Nessuna scadenza inserita. Apri un'azienda e usa 📅 sui documenti.";
    root.appendChild(em);return;
  }

  // Group by status band for "urgenti" and "tutti"
  const groups=[];
  if(scadTab==="urgenti"){
    if(expired.length) groups.push({label:"Scaduti",items:expired,color:"#A32D2D"});
    if(soon.length) groups.push({label:"In scadenza (entro 60gg)",items:soon,color:"#BA7517"});
  } else if(scadTab==="ok"){
    groups.push({label:"Validi",items:ok,color:"#1D9E75"});
  } else {
    if(expired.length) groups.push({label:"Scaduti",items:expired,color:"#A32D2D"});
    if(soon.length) groups.push({label:"In scadenza",items:soon,color:"#BA7517"});
    if(ok.length) groups.push({label:"Validi",items:ok,color:"#1D9E75"});
  }

  groups.forEach(({label,items,color})=>{
    const lbl=mk("div","scad-section-lbl");lbl.textContent=label;lbl.style.color=color;root.appendChild(lbl);
    const card=mk("div","scad-card");
    items.forEach(({eid,ename,etype,dateStr,docLabel,st})=>{
      const row=mk("div","scad-row");
      const dot=mk("div","scad-dot");dot.style.background=color;row.appendChild(dot);
      const info=mk("div","scad-info");
      const doc=mk("div","scad-doc");doc.textContent=docLabel.length>60?docLabel.slice(0,58)+"…":docLabel;info.appendChild(doc);
      const az=mk("div","scad-az");az.textContent=(TI[etype]?.label||etype)+" · "+ename;info.appendChild(az);
      row.appendChild(info);

      const dateEl=mk("div","scad-date");dateEl.style.color=color;dateEl.textContent=fmtD(dateStr).replace(" "+new Date(dateStr+"T12:00:00").getFullYear(),"");right.appendChild(dateEl);
      const daysEl=mk("div","scad-days");daysEl.style.color=color;
      daysEl.textContent=st.diff<0?Math.abs(st.diff)+"gg fa":st.diff===0?"oggi":"+"+st.diff+"gg";
      right.appendChild(daysEl);row.appendChild(right);
      row.onclick=()=>{activeTab[eid]="doc";goChecklist(eid);};

  const today=new Date().toLocaleDateString("it-IT",{day:"2-digit",month:"long",year:"numeric"});
  let html=`<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>Piano AC – ${esc(e.name)}</title>
<style>
body{font-family:Arial,sans-serif;font-size:12px;color:#1a2540;margin:20mm 18mm;line-height:1.5}
h1{font-size:18px;color:#1F3864;margin-bottom:4px}
.sub{font-size:11px;color:#5a6a88;margin-bottom:16px}
hr{border:none;border-top:2px solid #1F3864;margin-bottom:16px}
.item{border:1px solid #dde3ec;border-radius:8px;margin-bottom:12px;overflow:hidden;break-inside:avoid}
.item-hdr{background:#f0f4f8;padding:8px 12px;display:flex;gap:8px;align-items:flex-start}
.badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.ko{background:#fcebeb;color:#A32D2D}.f{background:#faeeda;color:#854F0B}.a{background:#e8f7f2;color:#0F6E56}

.req-txt{font-size:11px;font-weight:600;flex:1}
.sec-lbl{font-size:10px;color:#8a9ab8;flex-shrink:0}
.item-body{padding:9px 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{margin-bottom:4px}
.field-lbl{font-size:10px;font-weight:700;color:#5a6a88;margin-bottom:2px}
.field-val{font-size:12px;border-bottom:1px solid #dde3ec;padding-bottom:3px;min-height:18px}
.action{grid-column:1/-1}
.status-aperta{color:#A32D2D;font-weight:700}
.status-corso{color:#854F0B;font-weight:700}

.summary{display:flex;gap:16px;margin-bottom:16px;background:#f0f4f8;padding:10px 14px;border-radius:8px}
.sum-item{text-align:center;flex:1}
.sum-v{font-size:20px;font-weight:800}
.sum-l{font-size:10px;color:#5a6a88}

</style></head><body>
<h1>Piano Azioni Correttive — GlobalG.A.P. 2025/2026</h1>
<div class="sub">Azienda: <strong>${esc(e.name)}</strong>${(TI[e.type]?" · "+TI[e.type].label:"")} &nbsp;|&nbsp; Data: ${today}</div>
<hr>`;

  const aperte=items.filter(x=>(pac[x.k]?.status||"aperta")==="aperta").length;
  const corso=items.filter(x=>pac[x.k]?.status==="corso").length;
  const chiuse=items.filter(x=>pac[x.k]?.status==="chiusa").length;
  html+=`<div class="summary">
    <div class="sum-item"><div class="sum-v" style="color:#A32D2D">${aperte}</div><div class="sum-l">Aperte</div></div>
    <div class="sum-item"><div class="sum-v" style="color:#BA7517">${corso}</div><div class="sum-l">In corso</div></div>
    <div class="sum-item"><div class="sum-v" style="color:#1D9E75">${chiuse}</div><div class="sum-l">Chiuse</div></div>
    <div class="sum-item"><div class="sum-v">${items.length}</div><div class="sum-l">Totale NC/PC</div></div>
  </div>`;

  items.forEach(({k,sec,itm,v})=>{
    const entry=pac[k]||{};
    const action=entry.action||(PAC_SUGGERIMENTI[k]||"—");
    const resp=entry.responsible||"—";
    const dead=entry.deadline?fmtD(entry.deadline):"—";
    const st=entry.status||"aperta";
    const stLabel=st==="chiusa"?"🟢 Chiusa":st==="corso"?"🟡 In corso":"🔴 Aperta";
    html+=`<div class="item">
      <div class="item-hdr">
        <span class="badge ${itm.p==="KO"?"ko":itm.p==="F"?"f":"a"}">${itm.p}</span>
        <span class="badge ${v==="NC"?"nc":"pc"}">${v}</span>
        <span class="req-txt">${esc(itm.t)}</span>
        <span class="sec-lbl">${esc(sec.label)}</span>
      </div>
      <div class="item-body">

        <div class="field"><div class="field-lbl">RESPONSABILE</div><div class="field-val">${esc(resp)}</div></div>
        <div class="field"><div class="field-lbl">SCADENZA</div><div class="field-val">${esc(dead)}</div></div>
        <div class="field"><div class="field-lbl">STATO</div><div class="field-val status-${st}">${stLabel}</div></div>
      </div>
    </div>`;
  });
  html+=`</body></html>`;

    const orig=document.body.innerHTML,origTitle=document.title;
    document.body.dataset.printing=orig;document.body.dataset.printTitle=origTitle;
    document.title="Piano AC – "+e.name;
    document.body.innerHTML=html.replace(/<!DOCTYPE.*?<body>/s,"").replace(/<\/body>.*$/s,"");
    const done=()=>setTimeout(()=>{document.body.innerHTML=document.body.dataset.printing;document.title=document.body.dataset.printTitle||document.title;delete document.body.dataset.printing;render();},250);
    window.onafterprint=done;setTimeout(()=>window.print(),150);return;
  }
  const win=window.open("","_blank","width=800,height=900");
  if(win){
    let _printed=false;
    const _doPrint=()=>{if(!_printed){_printed=true;setTimeout(()=>win.print(),300);}};
    win.onload=_doPrint;
    win.document.write(html);
    win.document.close();
    setTimeout(()=>{if(win.document.readyState==="complete")_doPrint();},800);
  }
}

function goHome(){nav={page:"home"};editNote=null;editQNote=null;render();}
function goFolder(fid){nav={page:"folder",folderId:fid};editNote=null;editQNote=null;render();}
function goChecklist(eid){nav={page:"checklist",entityId:eid};editNote=null;editQNote=null;render();}
function goBack(){
  if(nav.page==="pac"){goChecklist(nav.entityId);return;}
  if(nav.page==="scadenzario"){goHome();return;}
  if(nav.page==="checklist"){const e=(getAnnataDB().entities||[]).find(x=>x.id===nav.entityId);if(e&&e.folderId)goFolder(e.folderId);else goHome();}
  else goHome();
}
function render(){
  // Se non loggato → mostra solo schermata di login
  if(!sbUser){renderLogin();return;}
  if(nav.page==="home")renderHome();
  else if(nav.page==="folder")renderFolder();
  else if(nav.page==="checklist")renderChecklist();
  else if(nav.page==="pac")renderPAC();
  else if(nav.page==="scadenzario")renderScadenzario();
}

function showConfirm(icon, title, msg, nameTxt, onConfirm){
  const ov=document.createElement("div");ov.className="confirm-overlay";
  ov.innerHTML=`
    <div class="confirm-box">
      <div class="confirm-icon">${icon}</div>
      <div class="confirm-title">${title}</div>
      <div class="confirm-msg">${msg}${nameTxt?`<span class="confirm-name">"${nameTxt}"</span>`:""}
      </div>
      <div class="confirm-btns">
        <button class="confirm-btn" id="cfn-no">Annulla</button>
        <button class="confirm-btn danger" id="cfn-si">Elimina</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
  const close=()=>document.body.removeChild(ov);
  ov.querySelector("#cfn-no").onclick=close;
  ov.querySelector("#cfn-si").onclick=()=>{close();onConfirm();};

}

function generatePDF(){
  const e=(getAnnataDB().entities||[]).find(x=>x.id===nav.entityId);if(!e)return;
  const ti=TI[e.type]||TI.singola;
  const folder=e.folderId?adb.folders.find(f=>f.id===e.folderId):null;
  const _gpdf=getAnnataDB();
  const checks=(_gpdf.checks||{})[e.id]||{};
  const notes=(_gpdf.notes||{})[e.id]||{};
  const qvals=(_gpdf.qval||{})[e.id]||{};
  const qnotes=(_gpdf.qnotes||{})[e.id]||{};
  const att=(getAnnataDB().attach||{})[e.id]||{};
  const cd=(_gpdf.dates||{})[e.id]||"";
  const d=docDone(e.id);const p=docPct(e.id);
  const qs=qStats(e.id);

  const valColor={C:"#0F6E56",PC:"#854F0B",NC:"#A32D2D",NA:"#555",NV:"#3C3489"};
  const valBg={C:"#e8f7f2",PC:"#faeeda",NC:"#fcebeb",NA:"#f0f4f8",NV:"#EEEDFE"};
  const pesoBg={KO:"#fcebeb",F:"#faeeda",A:"#e8f7f2"};
  const pesoCol={KO:"#A32D2D",F:"#854F0B",A:"#0F6E56"};
  const renderAtt=(list=[])=>{
    if(!list.length)return "";
    const imgs=list.filter(x=>(x.type||"").startsWith("image/"));
    const docs=list.filter(x=>!(x.type||"").startsWith("image/"));
    return `<div class="attbox">${imgs.map(x=>`<img class="attimg" src="${x.data}" alt="${esc(x.name)}">`).join("")}${docs.map(x=>`<div class="attdoc">${fileIcon(x.type)} ${esc(x.name)}</div>`).join("")}</div>`;
  };

  let html=`<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"/>
<title>GlobalGAP - ${e.name}</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:12px;color:#1a2540;background:#fff;padding:16px}
.hdr{background:#1F3864;color:#fff;padding:10px 14px;border-radius:6px;margin-bottom:12px}
.hdr h1{font-size:16px;font-weight:700;margin-bottom:2px}
.hdr p{font-size:11px;opacity:.8}
.info-row{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:#f0f4f8;border-radius:6px}
.info-item{font-size:11px;color:#5a6a88}
.info-item strong{color:#1a2540}
.tab-title{font-size:14px;font-weight:700;color:#1F3864;border-bottom:2px solid #1F3864;padding-bottom:4px;margin:14px 0 8px}
.sec-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;margin-bottom:4px}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-name{font-size:12px;font-weight:700;flex:1}
.sec-badge{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700}
.itm{display:flex;align-items:flex-start;gap:8px;padding:6px 10px;border-bottom:1px solid #eee}
.itm:last-child{border-bottom:none}
.chk{width:14px;height:14px;border:1.5px solid #ccc;border-radius:3px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.chk.on{background:#1D9E75;border-color:#1D9E75}
.itm-txt{font-size:11px;line-height:1.5;flex:1}
.itm-txt.done{text-decoration:line-through;color:#8a9ab8}
.note{font-size:10px;color:#185FA5;background:#e6f1fb;border-radius:4px;padding:4px 7px;margin-top:4px;line-height:1.4}
.attbox{margin-top:6px;display:flex;flex-wrap:wrap;gap:8px}
.attimg{width:72px;height:54px;object-fit:cover;border:1px solid #dde3ec;border-radius:6px;background:#fff}
.attdoc{font-size:10px;color:#5a6a88;background:#f0f4f8;border-radius:4px;padding:4px 7px;display:inline-block}
.qitm{padding:6px 10px;border-bottom:1px solid #eee}
.qitm:last-child{border-bottom:none}
.qitm-top{display:flex;align-items:flex-start;gap:7px;margin-bottom:4px}
.peso{font-size:9px;font-weight:700;padding:2px 5px;border-radius:3px;flex-shrink:0;margin-top:1px}
.qval{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;display:inline-block}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.met{text-align:center;padding:8px;border:1px solid #dde3ec;border-radius:6px}
.met-v{font-size:18px;font-weight:700}
.met-l{font-size:9px;color:#5a6a88;margin-top:2px}
.sec-box{border:1px solid #dde3ec;border-radius:6px;margin-bottom:8px;overflow:hidden;break-inside:avoid}
.banner{padding:7px 12px;border-radius:5px;font-size:12px;font-weight:700;text-align:center;margin-bottom:10px}
@media print{body{padding:8px}@page{margin:12mm}}
</style></head><body>`;

  // HEADER
  html+=`<div class="hdr"><h1>Checklist GlobalG.A.P. 2025/2026 &ndash; ${e.name}</h1><p>${ti.label}${folder?" &middot; "+folder.name:""}${cd?" &middot; Data compilazione: "+fmtD(cd):""}</p></div>`;

  // INFO ROW
  html+=`<div class="info-row">
    <div class="info-item"><strong>Documentazione:</strong> ${d}/${DOC_TOTAL} voci (${p}%)</div>
    <div class="info-item"><strong>Qualifica &ndash; Conformit&agrave;:</strong> ${qs.conf!==null?qs.conf+"%":"non avviata"}</div>
    <div class="info-item"><strong>C:</strong> ${qs.C} &nbsp;<strong>PC:</strong> ${qs.PC} &nbsp;<strong>NC:</strong> ${qs.NC} &nbsp;<strong>NA:</strong> ${qs.NA} &nbsp;<strong>NV:</strong> ${qs.NV}</div>
    ${qs.koNC>0?`<div class="info-item" style="color:#A32D2D;font-weight:700">&#9940; ${qs.koNC} KO non conforme${qs.koNC>1?"i":""}</div>`:""}
  </div>`;

  // ── DOCUMENTAZIONE ──
  html+=`<div class="tab-title">&#128203; Documentazione</div>`;
  DOC_SECTIONS.forEach(sec=>{
    const sd=sec.items.filter((_,i)=>checks[sec.id+"_"+i]).length;
    const bsColor=sd===sec.items.length?"#e8f7f2":sd>0?"#faeeda":"#f0f4f8";
    const btColor=sd===sec.items.length?"#0F6E56":sd>0?"#854F0B":"#5a6a88";
    html+=`<div class="sec-box"><div class="sec-hdr" style="background:${bsColor}">
      <div class="sec-dot" style="background:${sec.color}"></div>
      <div class="sec-name">${sec.label}</div>
      <span class="sec-badge" style="background:${bsColor};color:${btColor}">${sd}/${sec.items.length}</span>
    </div>`;
    sec.items.forEach((text,idx)=>{
      const k=sec.id+"_"+idx;const isDone=!!checks[k];const noteVal=notes[k]||"";
      html+=`<div class="itm">
        <div class="chk${isDone?" on":""}">${isDone?`<svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5L3.5 6L8 1" stroke="white" stroke-width="1.8" stroke-linecap="round"/></svg>`:""}</div>
        <div style="flex:1"><div class="itm-txt${isDone?" done":""}">${esc(text)}</div>${noteVal?`<div class="note"><strong>Nota:</strong> ${esc(noteVal)}</div>`:""}${renderAtt(att[k]||[])}</div>
      </div>`;
    });
    html+=`</div>`;
  });

  // ── QUALIFICA ──
  html+=`<div class="tab-title" style="margin-top:16px">&#9989; Qualifica</div>`;
  if(qs.eval===0){html+=`<div class="banner" style="background:#f0f4f8;color:#5a6a88">Nessuna valutazione inserita</div>`;}
  else if(qs.koNC>0){html+=`<div class="banner" style="background:#fcebeb;color:#A32D2D">&#9940; ${qs.koNC} KO non conforme${qs.koNC>1?"i":""} &mdash; Conformit&agrave;: ${qs.conf}%</div>`;}
  else if(qs.conf>=80){html+=`<div class="banner" style="background:#e8f7f2;color:#0F6E56">Conformit&agrave;: ${qs.conf}% (C: ${qs.C} &middot; PC: ${qs.PC} &middot; NC: ${qs.NC})</div>`;}
  else{html+=`<div class="banner" style="background:#faeeda;color:#854F0B">&#9888; Conformit&agrave;: ${qs.conf}% (C: ${qs.C} &middot; PC: ${qs.PC} &middot; NC: ${qs.NC})</div>`;}

  Q.forEach(sec=>{
    const secNC=sec.items.filter((_,i)=>qvals[sec.id+"_"+i]==="NC").length;
    const secEval=sec.items.filter((_,i)=>qvals[sec.id+"_"+i]&&!["NA","NV"].includes(qvals[sec.id+"_"+i])).length;
    const secC=sec.items.filter((_,i)=>qvals[sec.id+"_"+i]==="C").length;
    const bsColor=secNC>0?"#fcebeb":secEval===sec.items.length&&secEval>0?"#e8f7f2":secEval>0?"#faeeda":"#f0f4f8";
    const btColor=secNC>0?"#A32D2D":secEval===sec.items.length&&secEval>0?"#0F6E56":secEval>0?"#854F0B":"#5a6a88";
    html+=`<div class="sec-box"><div class="sec-hdr" style="background:${bsColor}">
      <div class="sec-dot" style="background:${sec.color}"></div>
      <div class="sec-name">${sec.label}</div>
      <span class="sec-badge" style="background:${bsColor};color:${btColor}">${secEval>0?secC+"/"+secEval:"–"}</span>
    </div>`;
    sec.items.forEach((itm,idx)=>{
      const k=sec.id+"_"+idx;const v=qvals[k];const qn=qnotes[k]||"";const qatt=att[k]||[];
      if(!v&&!qn&&!qatt.length)return; // salta voci senza valutazione, note o allegati
      const pbg=pesoBg[itm.p]||"#f0f4f8";const pcol=pesoCol[itm.p]||"#5a6a88";
      const vbg=v?valBg[v]:"#f0f4f8";const vcol=v?valColor[v]:"#5a6a88";
      html+=`<div class="qitm">
        <div class="qitm-top">
          <span class="peso" style="background:${pbg};color:${pcol}">${itm.p||"–"}</span>
          <div style="flex:1;font-size:11px;line-height:1.5">${esc(itm.t)}</div>
          ${v?`<span class="qval" style="background:${vbg};color:${vcol}">${v}</span>`:""}
        </div>
        ${qn?`<div class="note"><strong>Nota:</strong> ${esc(qn)}</div>`:""}${renderAtt(qatt)}
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`</body></html>`;

  // Su iOS/Safari evitiamo la nuova finestra: dopo l'anteprima spesso non si torna bene indietro
  const ua=navigator.userAgent||"";
  const isIOS=/iPad|iPhone|iPod/.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  const restorePrintView=()=>{
    if(!document.body.dataset.printing)return;
    document.body.innerHTML=document.body.dataset.printing;
    document.title=document.body.dataset.printTitle||document.title;
    delete document.body.dataset.printing;
    delete document.body.dataset.printTitle;
    render();
  };

  if(isIOS){
    const orig=document.body.innerHTML;
    const origTitle=document.title;
    document.body.dataset.printing=orig;
    document.body.dataset.printTitle=origTitle;
    document.title="GlobalGAP - "+e.name;
    document.body.innerHTML=html.replace(/<!DOCTYPE.*?<body>/s,"").replace(/<\/body>.*$/s,"");

    const done=()=>setTimeout(restorePrintView,250);
    window.onafterprint=done;
    const mm=window.matchMedia?window.matchMedia("print"):null;
    if(mm){
      const mmHandler=(ev)=>{if(!ev.matches){done();if(mm.removeEventListener)mm.removeEventListener("change",mmHandler);else if(mm.removeListener)mm.removeListener(mmHandler);}};
      if(mm.addEventListener)mm.addEventListener("change",mmHandler);else if(mm.addListener)mm.addListener(mmHandler);
    }
    window.addEventListener("pageshow",done,{once:true});
    setTimeout(()=>window.print(),150);
    return;
  }

  const win=window.open("","_blank","width=800,height=900");
  if(win){
    let _printed=false;
    const _doPrint=()=>{if(!_printed){_printed=true;setTimeout(()=>win.print(),300);}};
    win.onload=_doPrint;
    win.document.write(html);
    win.document.close();
    setTimeout(()=>{if(win.document.readyState==="complete")_doPrint();},800);
  } else {
    const orig=document.body.innerHTML;
    const origTitle=document.title;
    document.body.dataset.printing=orig;
    document.body.dataset.printTitle=origTitle;
    document.title="GlobalGAP - "+e.name;
    document.body.innerHTML=html.replace(/<!DOCTYPE.*?<body>/s,"").replace(/<\/body>.*$/s,"");
    const done=()=>setTimeout(restorePrintView,250);
    window.onafterprint=done;
    setTimeout(()=>window.print(),150);
  }
}

function sdToast(msg,ok=true){
  let t=document.getElementById("sd-toast");
  if(!t){t=document.createElement("div");t.id="sd-toast";t.style.cssText="position:fixed;top:68px;right:12px;z-index:9999;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;color:white;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:opacity .3s;opacity:0;pointer-events:none;max-width:280px";document.body.appendChild(t);}

// Legge/scrive email e preavviso sull'entity stessa (localStorage)
function sdGetEntityCfg(eid){
  const adb=getAnnataDB();
  const e=adb.entities.find(x=>x.id===eid);
  return {email:e?.sd_email||"",preavviso:e?.sd_preavviso||"30"};
}
function sdSaveEntityCfg(eid,email,preavviso){
  const adb=getAnnataDB();
  const e=adb.entities.find(x=>x.id===eid);
  if(!e)return;
  e.sd_email=email;e.sd_preavviso=preavviso;
  save();
}

// Scadenze locali (localStorage) come fallback senza Supabase
function sdLocalKey(eid){return "sd_sc_"+eid;}
function sdGetLocal(eid){try{return JSON.parse(localStorage.getItem(sdLocalKey(eid))||"[]");}catch(e){return [];}}
function sdSaveLocal(eid,arr){localStorage.setItem(sdLocalKey(eid),JSON.stringify(arr));}

async function sdGetScadenze(eid){
  if(sb&&sbUser){
    const {data,error}=await sb.from("sd_scadenze").select("*").eq("azienda_id",eid).order("data_scadenza",{ascending:true});
    if(!error) return data||[];
  }
  return sdGetLocal(eid);
}

async function sdInsertScadenza(eid,payload){
  if(sb&&sbUser){
    await sb.from("sd_scadenze").insert({...payload,azienda_id:eid,user_id:sbUser.id});
    return;
  }
  const arr=sdGetLocal(eid);
  arr.push({...payload,id:"loc_"+Date.now(),azienda_id:eid});
  sdSaveLocal(eid,arr);
}

async function sdDeleteScadenza(eid,sid){
  if(sb&&sbUser){await sb.from("sd_scadenze").delete().eq("id",sid);return;}
  const arr=sdGetLocal(eid).filter(x=>x.id!==sid);
  sdSaveLocal(eid,arr);
}

async function sdRenderScList(eid,container){
  const sc=await sdGetScadenze(eid);
  const today=new Date();today.setHours(0,0,0,0);
  if(!sc.length){
    container.appendChild(mk("div","empty","Nessuna scadenza · clicca + Aggiungi scadenza"));
    return;
  }
  sc.forEach(s=>{
    const d=new Date(s.data_scadenza);
    const g=Math.ceil((d-today)/864e5);
    const col=g<0?"#ef4444":g<=15?"#ef4444":g<=30?"#f59e0b":"#10b981";
    const lbl=g<0?`🔴 Scaduta ${Math.abs(g)}gg fa`:g===0?"🔴 Scade oggi":g<=15?`🔴 ${g}gg`:g<=30?`⚠️ ${g}gg`:`✅ ${g}gg`;
    const c=mk("div","card");c.style.cssText="padding:12px 14px;margin-bottom:8px";
    const r=mk("div","card-row");r.style.cssText="align-items:flex-start";
    const inf=mk("div");inf.style.cssText="flex:1;min-width:0";
    inf.innerHTML=`<div style="font-size:13px;font-weight:700">${esc(s.descrizione||s.tipologia||"—")}</div>
      <div style="font-size:11px;color:#64748b;margin-top:2px">${s.categoria?esc(s.categoria)+" · ":""}${s.tipologia?esc(s.tipologia)+" · ":""}Scad: <strong>${sdFmtD(s.data_scadenza)}</strong>${s.anno_campagna?" · "+s.anno_campagna:""}${s.note?" · "+esc(s.note):""}</div>`;
    const meta=mk("div");meta.style.cssText="display:flex;align-items:center;gap:8px;flex-shrink:0";
    const chip=mk("span");chip.style.cssText=`font-size:11px;font-weight:700;color:${col};padding:2px 8px;border-radius:20px;background:${col}18`;
    chip.textContent=lbl;meta.appendChild(chip);
    const del=mk("button","btn btn-sm");del.style.cssText="font-size:11px;padding:3px 8px;margin:0;background:#fef2f2;color:#ef4444;border-color:#fca5a5;";
    del.textContent="🗑";del.onclick=async()=>{
      showConfirm("🗑","Elimina scadenza","Eliminare questa scadenza?","Elimina",async()=>{
        await sdDeleteScadenza(eid,s.id);sdToast("Eliminata");
        const el=document.getElementById("sd-sc-list");
        if(el){el.innerHTML="";await sdRenderScList(eid,el);}
      });
    };
    meta.appendChild(del);
    r.appendChild(inf);r.appendChild(meta);c.appendChild(r);container.appendChild(c);
  });
}

async function sdRenderRqList(eid,root){
  if(!sb) return;
  const {data:rqs}=await sb.from("sd_richieste").select("*").eq("azienda_id",eid).order("created_at",{ascending:false}).limit(5);
  if(!rqs||!rqs.length) return;
  const lbl=mk("div","slbl");lbl.style.cssText="margin-bottom:8px";lbl.textContent="RICHIESTE INVIATE (ultime 5)";root.appendChild(lbl);
  rqs.forEach(r=>{
    const docs=r.documenti_richiesti||[];
    const ups=r.uploads||{};
    const nUps=Object.keys(ups).length;
    const scad=new Date(r.scade_il)<new Date();
    const done=nUps>=docs.length&&docs.length>0;
    const col=scad?"#ef4444":done?"#10b981":"#3b82f6";
    const stato=scad?"⏰ Scaduto":done?"✅ Completato":"📤 In attesa";
    const link=`${location.href.split("?")[0]}?sdtoken=${r.token}`;
    const c=mk("div","card");c.style.cssText="padding:10px 14px;margin-bottom:6px";
    const rv=mk("div","card-row");
    rv.innerHTML=`<div style="font-size:13px;flex:1"><span style="font-weight:700;color:${col}">${stato}</span> · ${docs.length} doc · ${nUps}/${docs.length} caricati · scade ${sdFmtD(r.scade_il)}</div>`;
    const cp=mk("button","btn btn-sm");cp.style.cssText="font-size:11px;padding:3px 10px;margin:0;flex-shrink:0";cp.textContent="🔗 Link";
    cp.onclick=()=>navigator.clipboard.writeText(link).then(()=>sdToast("Link copiato!")).catch(()=>prompt("Link:",link));
    rv.appendChild(cp);c.appendChild(rv);
    // File caricati con pulsante Allega in Doc
    if(nUps>0){
      const upList=mk("div","");upList.style.cssText="margin-top:8px;border-top:1px solid #f1f5f9;padding-top:8px;display:flex;flex-direction:column;gap:6px";
      Object.entries(ups).forEach(([idx,u])=>{
        const doc=docs[parseInt(idx)];
        const row=mk("div","");row.style.cssText="display:flex;align-items:center;gap:8px;font-size:12px";
        row.innerHTML=`<span style="color:#10b981;flex-shrink:0">✅</span><span style="flex:1;color:#1e293b;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.nome)}</span>`;
        const allegaBtn=mk("button","btn btn-sm");
        allegaBtn.style.cssText="font-size:11px;padding:3px 8px;margin:0;background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe;flex-shrink:0";
        allegaBtn.textContent="📎 Allega in Doc";
        allegaBtn.onclick=async()=>{
          allegaBtn.textContent="⏳...";allegaBtn.disabled=true;
          try{
            const {data:urlData}=sb.storage.from("Documenti").getPublicUrl(u.path);
            const resp=await fetch(urlData.publicUrl);
            if(!resp.ok) throw new Error("Download fallito");
            const blob=await resp.blob();
            const reader=new FileReader();
            reader.onload=()=>{
              // Trova sezione e indice corrispondente in DOC_SECTIONS
              let secId="doc",itemIdx=0,found=false;
              for(const sec of DOC_SECTIONS){
                for(let i=0;i<sec.items.length;i++){
                  if(sec.items[i]===doc?.descrizione){secId=sec.id;itemIdx=i;found=true;break;}
                }
                if(found)break;
              }
              const key=secId+"_"+itemIdx;
              const payload={name:u.nome,size:blob.size,type:blob.type||"application/octet-stream",data:reader.result};
              const arr=ensureAttachStore(eid,key);
              if(!arr.find(a=>a.name===u.nome)){arr.push(payload);save();}
              allegaBtn.textContent="✅ Allegato!";
              allegaBtn.style.background="#f0fdf4";allegaBtn.style.color="#15803d";allegaBtn.style.borderColor="#bbf7d0";
              sdToast(`${u.nome} allegato in Doc!`);
            };
            reader.readAsDataURL(blob);
          }catch(err){
            allegaBtn.textContent="❌ Errore";allegaBtn.disabled=false;
            sdToast("Errore: "+err.message,false);
          }
        };
        row.appendChild(allegaBtn);upList.appendChild(row);
      });
      c.appendChild(upList);
    }
    root.appendChild(c);
  });
}

  const chks=[...document.querySelectorAll("input[name='sdrq']:checked")];
  if(!chks.length){sdToast("Seleziona almeno un documento",false);return;}
  const docs=chks.map(cb=>({descrizione:cb.dataset.desc,categoria:cb.dataset.cat}));
  const val=parseInt(document.getElementById("sdrq-val").value)||15;
  const msg=document.getElementById("sdrq-msg").value||"";
  const scadeIl=new Date();scadeIl.setDate(scadeIl.getDate()+val);
  const token=Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(36)).join("").substring(0,20);
  const p={azienda_id:eid,azienda_nome:nome,documenti_richiesti:docs,messaggio:msg,token,
    scade_il:scadeIl.toISOString().split("T")[0],uploads:{},created_at:new Date().toISOString()};
  const baseUrl=location.href.split("?")[0];
  let link;
  // Prova Supabase → link corto (funziona anche senza login)
  if(sb){
    try{
      const ins={azienda_id:eid,azienda_nome:nome,documenti_richiesti:docs,messaggio:msg,token,
        scade_il:scadeIl.toISOString().split("T")[0],uploads:{}};
      if(sbUser) ins.user_id=sbUser.id;
      const {error}=await sb.from("sd_richieste").insert(ins);
      if(!error){link=`${baseUrl}?sdtoken=${token}`;}
      else{console.warn("Supabase insert error:",error.message);}
    }catch(e){console.warn("Supabase error:",e);}
  }
  // Fallback localStorage → link lungo base64
  if(!link){
    const lsArr=JSON.parse(localStorage.getItem("sd_richieste")||"[]");
    lsArr.push({...p,id:"loc_"+Date.now()});
    localStorage.setItem("sd_richieste",JSON.stringify(lsArr));
    const encoded=btoa(unescape(encodeURIComponent(JSON.stringify({nome,docs,msg,scade:scadeIl.toISOString().split("T")[0],token}))));
    link=`${baseUrl}?sddata=${encoded}`;
  }
  closeModal();
  activeTab[nav.entityId]="scadoc";
  renderChecklist();
  setTimeout(()=>sdShowRichiestaResult(link,nome,cfg,msg,scadeIl),100);
}

async function sdCheckAziendaAlerts(eid){
  const cfg=sdGetEntityCfg(eid);
  const adb=getAnnataDB();
  const e=adb.entities.find(x=>x.id===eid);
  const sc=await sdGetScadenze(eid);
  const today=new Date();today.setHours(0,0,0,0);
  const prev=(cfg.preavviso||"30").split(",").map(Number);
  let n=0;
  for(const s of sc){
    const g=Math.ceil((new Date(s.data_scadenza)-today)/864e5);
    if(prev.includes(g)||g<0){
      const subj=g<0?`🔴 Scadenza SUPERATA – ${s.descrizione||s.tipologia}`:`⚠️ Scadenza tra ${g} giorni – ${s.descrizione||s.tipologia}`;
      const body=`Gentile ${e?.name||"azienda"},\n\nIl documento "${s.descrizione||s.tipologia}"${s.categoria?" ("+s.categoria+")":""} ${g<0?"è scaduto il":"scadrà il"} ${sdFmtD(s.data_scadenza)}.\n\n${g<0?"Documento SCADUTO":"Mancano "+g+" giorni"}.\n\nContattare il tecnico SATA per informazioni.\n\nTeam SATA`;
      if(cfg.email) await sdSendMail(cfg.email,subj,body);
      if(sbUser?.email&&sbUser.email!==cfg.email) await sdSendMail(sbUser.email,`[SATA] ${e?.name||""} – ${s.descrizione||s.tipologia}`,body);
      n++;
    }
  }
  sdToast(n?`${n} alert inviati!`:"Nessun alert da inviare (controlla i preavvisi configurati)",n>0);
}

async function sdSaveAndSendResend(to, nomeEnc, link, msgEnc, scadeIsoEnc){
  const nome=decodeURIComponent(nomeEnc);
  const msg=decodeURIComponent(msgEnc);
  const scadeIl=new Date(scadeIsoEnc);
  const key=document.getElementById("sd-resend-key")?.value.trim();
  if(!key){sdToast("Inserisci la API key Resend",false);return;}
  const c=sdGetEmailCfg();c.resend=key;
  localStorage.setItem("sd_emailcfg",JSON.stringify(c));
  const subject=`SATA – Documenti da caricare – ${nome}`;
  const text=`Gentile ${nome},\n\n${msg}\n\nAccedi al portale:\n${link}\n\nLink scade il ${sdFmtD(scadeIl.toISOString())}.\n\nTeam SATA`;
  try{
    const r=await fetch("https://api.resend.com/emails",{method:"POST",
      headers:{"Authorization":`Bearer ${key}`,"Content-Type":"application/json"},
      body:JSON.stringify({from:c.from||"noreply@resend.dev",to,subject,text})});
    if(r.ok){sdToast("✅ Email inviata via Resend!");return;}
    const err=await r.json();
    sdToast("Errore Resend: "+(err.message||"verifica la API key"),false);
  }catch(e){sdToast("Errore connessione Resend",false);}
}

async function sdCheckPortal(){
  const params=new URLSearchParams(location.search);
  const encoded=params.get("sddata");
  const legacyToken=params.get("sdtoken");
  if(!encoded&&!legacyToken) return false;

  // Mostra header portale
  document.querySelector(".topbar").innerHTML=`<div style="font-size:16px;font-weight:700;color:white">SATA<span style="color:#60a5fa;font-weight:300"> Doc</span></div><div style="font-size:12px;color:rgba(255,255,255,.5)">Portale Caricamento Documenti</div>`;
  const fab=document.querySelector(".fab");if(fab)fab.style.display="none";
  const root=document.getElementById("root");root.innerHTML=`<div style="color:#64748b;font-size:13px;padding:20px">Caricamento...</div>`;

  let rq=null;

  // Nuovo formato: dati nell'URL (funziona su qualsiasi dispositivo)
  if(encoded){
    try{
      rq=JSON.parse(decodeURIComponent(escape(atob(encoded))));
      // Compatibilità struttura
      rq.azienda_nome=rq.nome;
      rq.documenti_richiesti=rq.docs;
      rq.messaggio=rq.msg;
      rq.scade_il=rq.scade;
      rq.uploads={};
    }catch(e){
      root.innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:48px">❌</div><div style="font-size:16px;color:#ef4444;margin-top:12px">Link non valido.</div></div>`;
      return true;
    }
  }

  // Vecchio formato: cerca in localStorage o Supabase
  if(!rq&&legacyToken){
    const lsArr=JSON.parse(localStorage.getItem("sd_richieste")||"[]");
    rq=lsArr.find(x=>x.token===legacyToken)||null;
    if(!rq&&sb){
      try{const {data,error}=await sb.from("sd_richieste").select("*").eq("token",legacyToken).single();if(!error&&data)rq=data;}catch(e){}
    }
  }

  if(!rq){root.innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:48px">❌</div><div style="font-size:16px;color:#ef4444;margin-top:12px">Link non valido o scaduto.</div></div>`;return true;}
  if(rq.scade_il&&new Date(rq.scade_il)<new Date()){root.innerHTML=`<div style="text-align:center;padding:40px"><div style="font-size:48px">⏰</div><div style="font-size:16px;color:#f59e0b;margin-top:12px">Link scaduto. Contatta il tecnico SATA.</div></div>`;return true;}

  const nome=rq.azienda_nome||"Azienda";
  root.innerHTML=`<div style="max-width:680px;margin:0 auto;padding:16px">
    <div style="font-size:20px;font-weight:700;color:#1a2744;margin-bottom:4px">${esc(nome)}</div>
    <div style="font-size:13px;color:#64748b;margin-bottom:20px;line-height:1.6">${esc(rq.messaggio||"Carica i documenti richiesti.")}</div>
    <div id="sdp-docs"></div>
    <div id="sdp-done" style="display:none;text-align:center;padding:32px"><div style="font-size:52px">✅</div><div style="font-size:18px;font-weight:700;color:#10b981;margin-top:12px">Tutti i documenti caricati!</div><div style="font-size:13px;color:#64748b;margin-top:6px">Il tecnico SATA riceverà una notifica.</div></div>
  </div>`;
  sdRenderPortalDocs(rq);
  return true;
}

function sdRenderPortalDocs(rq){
  const docs=rq.documenti_richiesti||[],ups=rq.uploads||{};
  const c=document.getElementById("sdp-docs");if(!c)return;
  c.innerHTML=docs.map((d,i)=>{
    const ok=ups[i]?.nome;
    return `<div id="sdpi-${i}" style="background:white;border-radius:10px;border:1px solid #e2e8f0;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px">
      <div style="font-size:26px">${ok?"✅":"📄"}</div>
      <div style="flex:1"><div style="font-size:14px;font-weight:600">${esc(d.descrizione||d.tipologia)}</div>
        <div style="font-size:12px;color:#64748b">${d.categoria?esc(d.categoria):""}${d.scadenza?" · Scad: "+sdFmtD(d.scadenza):""}</div></div>
      <div id="sdpa-${i}">${ok
        ?`<span style="font-size:12px;font-weight:600;color:#10b981">✅ ${esc(ups[i].nome)}</span>`
        :`<label style="display:inline-flex;align-items:center;gap:5px;padding:8px 12px;background:#1F3864;color:white;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">📎 Carica<input type="file" style="display:none" onchange="sdPortalUpload(event,${i},'${rq.id}')"></label>`}
      </div>
    </div>`;
  }).join("");
}

async function sdPortalUpload(e,idx,rqId){
  const file=e.target.files[0];if(!file)return;
  document.getElementById(`sdpa-${idx}`).innerHTML=`<span style="font-size:12px;color:#64748b">Caricamento...</span>`;
  let ups={};
  if(sb){
    const path=`sd_uploads/${rqId}/${idx}_${file.name}`;
    const {error:ue}=await sb.storage.from("Documenti").upload(path,file,{upsert:true});
    if(ue){document.getElementById(`sdpa-${idx}`).innerHTML=`<span style="font-size:12px;color:#ef4444">Errore: ${ue.message}</span>`;return;}
    const {data:rq}=await sb.from("sd_richieste").select("uploads,documenti_richiesti").eq("id",rqId).single();
    ups=rq?.uploads||{};ups[idx]={nome:file.name,path,ts:new Date().toISOString()};
    await sb.from("sd_richieste").update({uploads:ups}).eq("id",rqId);
    const tot=(rq?.documenti_richiesti||[]).length,done=Object.keys(ups).length;
    if(done>=tot){document.getElementById("sdp-docs").style.display="none";document.getElementById("sdp-done").style.display="block";}
  } else {
    // Salva in localStorage (senza Supabase storage)
    const arr=JSON.parse(localStorage.getItem("sd_richieste")||"[]");
    const rqIdx=arr.findIndex(x=>x.id===rqId);
    if(rqIdx>=0){ups=arr[rqIdx].uploads||{};ups[idx]={nome:file.name,ts:new Date().toISOString()};arr[rqIdx].uploads=ups;localStorage.setItem("sd_richieste",JSON.stringify(arr));}
    const tot=(arr[rqIdx]?.documenti_richiesti||[]).length,done=Object.keys(ups).length;
    if(done>=tot){document.getElementById("sdp-docs").style.display="none";document.getElementById("sdp-done").style.display="block";}
  }
  document.getElementById(`sdpi-${idx}`).querySelector("div").textContent="✅";
  document.getElementById(`sdpa-${idx}`).innerHTML=`<span style="font-size:12px;font-weight:600;color:#10b981">✅ ${esc(file.name)}</span>`;
}

async function sfLinkAziendaToFolder(sf,az){

  _sfLinkCtx={sf,az};

  const opzioni=mieFolders.map(f=>`<option value="${f.id}">${esc(f.name)}</option>`).join("");

  mb.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px;margin-top:4px">
    <div style="font-size:13px;color:#1F3864">Azienda: <strong>${esc(az.name)}</strong><br>

async function sfConfirmAziendaToFolder(){
  const {sf,az}=_sfLinkCtx;
  const folderId=document.getElementById("sf-folder-sel").value;
  const adb=getAnnataDB();
  const folder=adb.folders.find(f=>f.id===folderId);
  if(!folder){closeModal();return;}

  // Aggiorna record su Supabase aggiungendo il collegamento
  const {data:current}=await sb.from("sd_shared_folders").select("folder_data").eq("id",sf.id).single();
  const fd=current?.folder_data||{};
  const prevLinked=(fd.linked_entities||[]).filter(e=>e.linked_by!==sbUser.id);
  const newLinked=[...prevLinked,{
    folder_id:folderId,folder_name:folder.name,
    linked_by:sbUser.id,linked_by_email:sbUser.email
  }];
  const {error}=await sb.from("sd_shared_folders").update({
    folder_data:{...fd,linked_entities:newLinked}
  }).eq("id",sf.id);

  if(error){sdToast("Errore: "+error.message,false);return;}
  closeModal();
  sdToast(`${az.name} collegata a ${folder.name}!`);
  render();
}

let _sfLinkCtx={};

async function sfLinkAzienda(sf){
  const adb=getAnnataDB();
  const mieAziende=adb.entities.filter(e=>e.type==="singola"||e.type==="fornitrice");
  if(!mieAziende.length){sdToast("Nessuna azienda da collegare — creane prima una",false);return;}
  _sfLinkCtx={sf};

  const opzioni=mieAziende.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join("");
  const mb=document.getElementById("modal-body");
  const modalEl=document.querySelector("#modal .modal");
  if(modalEl){modalEl.style.maxHeight="80vh";modalEl.style.overflowY="auto";}
  document.getElementById("modal-title").textContent="Collega azienda a cartella condivisa";
  mb.innerHTML=`<div style="display:flex;flex-direction:column;gap:12px;margin-top:4px">
    <div style="font-size:13px;color:#1F3864">Cartella: <strong>${esc(sf.folder_name)}</strong><br>
    <span style="font-size:12px;color:#64748b">Proprietario: ${esc(sf.owner_email)}</span></div>
    <div>
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:4px">SELEZIONA LA TUA AZIENDA</div>
      <select id="sf-az-sel" style="width:100%;padding:8px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:14px;font-family:inherit">
        ${opzioni}
      </select>
    </div>
    <div style="font-size:12px;color:#64748b;background:#f8fafc;border-radius:8px;padding:10px">
      L'azienda selezionata verrà collegata alla cartella del tuo collega.
    </div>
  </div>`;
  const row=document.querySelector("#modal .row");
  row.innerHTML=`<button class="btn btn-ok" onclick="sfConfirmLink()">Collega</button><button class="btn" onclick="closeModal()">Annulla</button>`;
  document.getElementById("modal").style.display="flex";
}

async function sfConfirmLink(){
  const {sf}=_sfLinkCtx;
  const azId=document.getElementById("sf-az-sel").value;
  const adb=getAnnataDB();
  const az=adb.entities.find(e=>e.id===azId);
  if(!az){closeModal();return;}

  // Leggi dati attuali
  const {data:current,error:re}=await sb.from("sd_shared_folders").select("folder_data").eq("id",sf.id).single();
  if(re){sdToast("Errore lettura dati: "+re.message,false);return;}

  const fd=current?.folder_data||{};
  const prevLinked=(fd.linked_entities||[]).filter(e=>e.linked_by!==sbUser.id);
  const newLinked=[...prevLinked,{
    id:az.id,name:az.name,type:az.type,
    linked_by:sbUser.id,linked_by_email:sbUser.email
  }];

  const {error:ue}=await sb.from("sd_shared_folders").update({
    folder_data:{...fd,linked_entities:newLinked}
  }).eq("id",sf.id);

  if(ue){sdToast("Errore collegamento: "+ue.message,false);return;}

  closeModal();
  sdToast(`${az.name} collegata a ${sf.folder_name}!`);
  render();
}
